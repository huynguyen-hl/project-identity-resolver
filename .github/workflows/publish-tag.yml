name: Publish Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:


# permissions:
#   contents: write
#   pull-requests: write

jobs:
  publish-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.publish-tag.outputs.new_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Get the version from version.json file and store it in the output file
      - name: Get version from version.json
        id: retrieve_version
        run: |
          new_version=$(jq -r '.version' version.json)
          if [ -z "$new_version" ]; then
            echo "Error: version field is empty or not found in version.json!"
            exit 1
          fi
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      # Create and push tag to the repository by using the version from the output file
      - name: Create and push tag
        id: publish-tag
        run: |
          new_version=${{ steps.retrieve_version.outputs.new_version }}

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -a "$new_version" -m "Release version $new_version"
          git push origin "$new_version"

          echo "new_tag=$new_version" >> "$GITHUB_OUTPUT"
  
  publish-release:
    runs-on: ubuntu-latest
    needs: publish-tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Create a release in the repository by using the version from the output file
      - name: Create release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          release-as: ${{ needs.publish-tag.outputs.new_tag }}

