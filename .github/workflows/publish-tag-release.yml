name: Publish Tag Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tag-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.retrieve_version.outputs.new_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Get the version from version.json file and store it in the output file
      - name: Get version from version.json
        id: retrieve_version
        run: |
          new_version=$(jq -r '.version' version.json)
          if [ -z "$new_version" ]; then
            echo "Error: version field is empty or not found in version.json!"
            exit 1
          fi
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      # Create and push tag to the repository by using the version from the output file
      - name: Create and push tag
        id: publish-tag
        run: |
          new_version=${{ steps.retrieve_version.outputs.new_version }}

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git tag -a "v$new_version" -m "Release version v$new_version"
          git push origin "v$new_version"

          echo "new_tag=$new_version" >> "$GITHUB_OUTPUT"

      # Create GitHub release
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_tag=${{ steps.publish-tag.outputs.new_tag }}

          gh release create "v$new_tag" \
            --title "Release ${{ steps.retrieve_version.outputs.new_version }}" \
            --notes-file CHANGELOG.md \
            --target ${{ github.ref_name }}